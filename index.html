<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  width: 400px;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.input-section {
  display: flex;
  gap: 10px;
}

.input-section input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
}

.input-section button {
  padding: 10px 15px;
  border: none;
  background: #667eea;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.filter-section {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.filter-section button {
  padding: 8px 12px;
  border: none;
  background: #eee;
  cursor: pointer;
  border-radius: 5px;
}

ul {
  list-style: none;
  margin-top: 20px;
}

li {
  background: #f1f1f1;
  padding: 10px;
  margin-bottom: 10px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  border-radius: 5px;
  cursor: pointer;
}

li.completed {
  text-decoration: line-through;
  background: #c8ffd2;
}

.task-buttons {
  display: flex;
  gap: 5px;
}

.task-buttons button {
  border: none;
  padding: 5px 8px;
  cursor: pointer;
  border-radius: 4px;
}

.edit-btn {
  background: orange;
  color: white;
}

.delete-btn {
  background: red;
  color: white;
}

.clear-btn {
  width: 100%;
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>
<body>

  <div class="container">

    <h1>📝 Todo List</h1>

    <div class="input-section">
      <input
        type="text"
        id="taskInput"
        placeholder="Enter a task..."
      >

      <button onclick="addTask()">Add</button>
    </div>

    <div class="filter-section">
      <button onclick="showAll()">All</button>
      <button onclick="showCompleted()">Completed</button>
      <button onclick="showPending()">Pending</button>
    </div>

    <ul id="taskList"></ul>

    <button class="clear-btn" onclick="clearTasks()">
      Clear All
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
